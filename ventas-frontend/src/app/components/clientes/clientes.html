<div class="container mt-4">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
      <a class="navbar-brand">🏪 Sistema de Ventas</a>
      <div class="d-flex">
        <span class="navbar-text text-white me-3">👤 {{ authService.getUser()?.nombre || 'Usuario' }}</span>
        <button class="btn btn-outline-light btn-sm" (click)="logout()">Cerrar Sesión</button>
      </div>
    </div>
  </nav>

  <div *ngIf="mensaje" class="alert alert-success">{{ mensaje }}</div>

  <div class="row">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-success text-white"><h5>➕ Nuevo Cliente</h5></div>
        <div class="card-body">
          <form #clienteForm="ngForm" (ngSubmit)="onSubmit(clienteForm)">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" name="nombre" class="form-control" [(ngModel)]="cliente.nombre" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" [(ngModel)]="cliente.email" required email>
            </div>
            <div class="mb-3">
              <label class="form-label">Teléfono</label>
              <input type="text" name="telefono" class="form-control" [(ngModel)]="cliente.telefono" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Dirección</label>
              <input type="text" name="direccion" class="form-control" [(ngModel)]="cliente.direccion" required>
            </div>
            <button type="submit" class="btn btn-success w-100" [disabled]="clienteForm.invalid">Guardar Cliente</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-7">
      <div class="card shadow">
        <div class="card-header bg-primary text-white"><h5>👥 Lista de Clientes</h5></div>
        <div class="card-body">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let c of clientes">
                <td>{{ c.id }}</td>
                <td>{{ c.nombre }}</td>
                <td>{{ c.email }}</td>
                <td>{{ c.telefono }}</td>
              </tr>
              <tr *ngIf="clientes.length === 0">
                <td colspan="4" class="text-center">No hay clientes registrados</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
